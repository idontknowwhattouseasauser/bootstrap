    <body>
    <!--Navigation Bar-->
    <nav class="navbar navbar-expand-md">
        <a class="navbar-brand">

    <!--Carousel-->
        <h1> Ireland Undercover</h1>
    <div  id="mycarousel" class="carousel slide" data-ride="carousel">
        <!--Indicators-->
        <ul class="carousel-indicators">
            <li data-target="#mycarousel" data-slide-to="0"></li>
            <li data-target="#mycarousel" data-slide-to="1" class="active"></li>
            <li data-target="#mycarousel" data-slide-to="2"></li>
            <li data-target="#mycarousel" data-slide-to="3"></li>
        </ul>
        <!--Slides-->
        <div class="carousel-inner">
            <div class="carousel-item"> 
                <img src="https://www.superprof.ie/blog/wp-content/uploads/2023/04/ireland-1-scaled.jpeg">
            </div>
            <div class="carousel-item active" > 
                <img src="https://res.cloudinary.com/djcyhbk2e/image/upload/c_fit,f_auto,h_800,q_35,w_800/v1/gvv/prod/nvhgezfo7akbdbrnkmhi">
            </div>
            <div class="carousel-item"> 
                <img src="https://transcode-v2.app.engoo.com/image/fetch/f_auto,c_lfill,w_300,dpr_3/https://assets.app.engoo.com/images/LBwfYxzQZef50cPclJZpEGnxDqbQLqXHtYH3ddsvLiH.jpeg">
            </div>
            <div class="carousel-item"> 
                <img src="https://www.irelandbeforeyoudie.com/wp-content/uploads/2019/01/temple-bar-dublin-1024x685.jpg">
            </div>
        </div>
        <!--Left and Right indicator-->
        <a class="carousel-control-prev" href="#mycarousel" data-slide="prev">
        <span class="carousel-control-prev-icon">   
        </span>
        </a>

        <a class="carousel-control-next" href="#mycarousel" data-slide="next">
        <span class="carousel-control-next-icon">   
        </span>
        </a>
    </div>

</html>
